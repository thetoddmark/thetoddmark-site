<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="refresh" content="0; url=/my-kit">
  <link rel="canonical" href="https://thetoddmark.com/my-kit">
  <meta name="robots" content="noindex">
  <title>Redirecting… | The Todd·Mark</title>
  <script>window.location.replace('/my-kit');</script>
  <style>

  /* ── NAV v2: dropdown redesign ── */

  /* Override old nav ul gap/alignment via ID */
  #nav-menu {
    list-style: none;
    display: flex;
    align-items: center;
    gap: 1.75rem;
  }
  #nav-menu > li { list-style: none; }

  /* Dropdown parent */
  .nav-has-dropdown { position: relative; }

  /* Toggle button mimics nav link styling */
  .nav-dropdown-toggle {
    background: none;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    font-weight: 300;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(245,240,232,1);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.35em;
    padding: 0;
    line-height: 1;
    transition: color 0.2s;
    white-space: nowrap;
  }
  .nav-dropdown-toggle:hover,
  .nav-has-dropdown:hover > .nav-dropdown-toggle { color: var(--amber-text); }

  /* Active state for dropdown parents and direct links */
  li.nav-active > a { color: var(--amber-text) !important; }
  li.nav-active > .nav-dropdown-toggle { color: var(--amber-text) !important; }

  /* Chevron: CSS triangle */
  .nav-chevron {
    display: inline-block;
    width: 0; height: 0;
    border-left: 3.5px solid transparent;
    border-right: 3.5px solid transparent;
    border-top: 4.5px solid currentColor;
    transition: transform 0.2s;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .nav-dropdown-toggle[aria-expanded="true"] .nav-chevron {
    transform: rotate(180deg);
  }

  /* Desktop dropdown panel (hover + JS open) */
  @media (min-width: 641px) {
    .nav-dropdown {
      position: absolute;
      top: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(26,20,9,0.98);
      border: 1px solid rgba(200,133,58,0.18);
      border-radius: 3px;
      padding: 0.4rem 0;
      min-width: 190px;
      list-style: none;
      margin: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
      z-index: 200;
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
    }
    /* Invisible bridge: keeps :hover active over the gap between nav item and panel */
    .nav-has-dropdown::after {
      content: '';
      position: absolute;
      top: 100%;
      left: -8px;
      right: -8px;
      height: 12px;
    }

    .nav-has-dropdown:hover .nav-dropdown,
    .nav-has-dropdown.is-open .nav-dropdown {
      opacity: 1;
      pointer-events: auto;
    }
    .nav-dropdown li { list-style: none; }
    .nav-dropdown a {
      display: block;
      padding: 0.45rem 1.2rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(245,240,232,0.7);
      text-decoration: none;
      white-space: nowrap;
      transition: color 0.15s, background 0.15s;
    }
    .nav-dropdown a:hover {
      color: rgba(245,240,232,1);
      background: rgba(200,133,58,0.08);
    }
    .nav-dropdown a.nav-placeholder {
      color: rgba(245,240,232,0.28);
      cursor: default;
      pointer-events: none;
    }
  }

  /* Mobile: full-screen overlay with inline expanding dropdowns */
  @media (max-width: 640px) {
    #nav-menu {
      display: none;
      position: fixed;
      top: 56px;
      left: 0; right: 0; bottom: 0;
      background: rgba(28,26,23,1);
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      gap: 0;
      z-index: 300;
      overflow-y: auto;
      padding: 0.75rem 0 2.5rem;
    }
    #nav-menu.nav-open { display: flex; }
    #nav-menu > li { width: 100%; text-align: center; }

    #nav-menu > li > a {
      display: block;
      padding: 0.9rem 2rem;
      font-size: 1.1rem !important;
      letter-spacing: 0.12em;
      color: rgba(245,240,232,1) !important;
      font-weight: 400 !important;
    }
    .nav-dropdown-toggle {
      font-size: 1.1rem !important;
      letter-spacing: 0.12em !important;
      color: rgba(245,240,232,1) !important;
      font-weight: 400 !important;
      padding: 0.9rem 2rem !important;
      width: 100%;
      justify-content: center;
    }
    .nav-dropdown {
      display: none;
      list-style: none;
      margin: 0;
      padding: 0.1rem 0 0.5rem;
      background: rgba(255,255,255,0.04);
    }
    .nav-has-dropdown.is-open .nav-dropdown { display: block; }
    .nav-dropdown a {
      display: block;
      padding: 0.6rem 2rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(245,240,232,0.6);
      text-decoration: none;
    }
    .nav-dropdown a:hover,
    .nav-dropdown a:focus { color: rgba(245,240,232,0.95); }
    .nav-dropdown a.nav-placeholder { color: rgba(245,240,232,0.25); pointer-events: none; }
  }

  </style>
</head>
<body>
  <p>Page moved. <a href="/my-kit">Go to My Kit →</a></p>
</body>
</html>
